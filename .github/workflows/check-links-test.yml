name: Check Links Test (Slack DM)

on:
  workflow_dispatch:
    inputs:
      skip_slack:
        description: 'Skip Slack and only print the payload in the Actions log'
        type: boolean
        default: false

jobs:
  check-links-test:
    name: Check Links Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Find and list broken links
        id: check-links
        run: node run/check-links.mjs

      - name: Preview Slack payload
        if: ${{ inputs.skip_slack }}
        run: |
          echo "=== Slack payload preview ==="
          echo "statusMessage: ${{ steps.check-links.outputs.statusMessage }}"
          echo "skipped: ${{ steps.check-links.outputs.skipped }}"
          echo "success: ${{ steps.check-links.outputs.success }}"
          echo "redirects: ${{ steps.check-links.outputs.redirects }}"
          echo "redirectErrors: ${{ steps.check-links.outputs.redirectErrors }}"
          echo "clientErrors: ${{ steps.check-links.outputs.clientErrors }}"
          echo "serverErrors: ${{ steps.check-links.outputs.serverErrors }}"
          echo "requestErrors: ${{ steps.check-links.outputs.requestErrors }}"
          echo "totalChecked: ${{ steps.check-links.outputs.totalChecked }}"
          echo "run_url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send report to Slack test DM
        if: ${{ !inputs.skip_slack && steps.check-links.outcome == 'success' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_TEST_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            statusMessage: "${{ steps.check-links.outputs.statusMessage }}"
            skipped: "${{ steps.check-links.outputs.skipped }}"
            success: "${{ steps.check-links.outputs.success }}"
            redirects: "${{ steps.check-links.outputs.redirects }}"
            redirectErrors: "${{ steps.check-links.outputs.redirectErrors }}"
            clientErrors: "${{ steps.check-links.outputs.clientErrors }}"
            serverErrors: "${{ steps.check-links.outputs.serverErrors }}"
            requestErrors: "${{ steps.check-links.outputs.requestErrors }}"
            totalChecked: "${{ steps.check-links.outputs.totalChecked }}"
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send failure notice to Slack test DM
        if: ${{ !inputs.skip_slack && failure() }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_TEST_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            statusMessage: "❌ Link check failed to run"
            skipped: "—"
            success: "—"
            redirects: "—"
            redirectErrors: "—"
            clientErrors: "—"
            serverErrors: "—"
            requestErrors: "—"
            totalChecked: "—"
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
