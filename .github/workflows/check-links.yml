name: Check Links and Send Failures to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "45 11 * * MON"
jobs:
  check-links-and-send-failures-to-slack:
    name: Check Links and Send Failures to Slack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Find and list broken links
        id: check-links
        run: node run/check-links.mjs

      - name: Send report to Slack
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            statusMessage: "${{ steps.check-links.outputs.statusMessage }}"
            skipped: "${{ steps.check-links.outputs.skipped }}"
            success: "${{ steps.check-links.outputs.success }}"
            redirects: "${{ steps.check-links.outputs.redirects }}"
            redirectErrors: "${{ steps.check-links.outputs.redirectErrors }}"
            clientErrors: "${{ steps.check-links.outputs.clientErrors }}"
            serverErrors: "${{ steps.check-links.outputs.serverErrors }}"
            requestErrors: "${{ steps.check-links.outputs.requestErrors }}"
            totalChecked: "${{ steps.check-links.outputs.totalChecked }}"
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
