name: Check Links and Send Failures to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: '45 11 * * MON'
jobs:
  check-links-and-send-failures-to-slack:
    name: Check Links and Send Failures to Slack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Find and list broken links
        id: check-links
        run: |
          report=$(node run/check-links.mjs --summary)
          echo "$report"
          {
            echo "report<<EOF"
            echo "$report"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send report to Slack
        if: steps.check-links.outcome == 'success'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            report: ${{ toJSON(steps.check-links.outputs.report) }}
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send failure notice to Slack
        if: failure()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            report: "❌ Link check failed to run. See GitHub Actions log for details."
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
